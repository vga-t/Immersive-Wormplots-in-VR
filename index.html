<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/danfojs@1.1.2/lib/bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/9.4.4/math.min.js"></script>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/materialsLibrary/babylon.gridMaterial.min.js"></script>
    <script src="https://cdn.babylonjs.com/webxr/babylon.webXR.min.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylon.glTF2FileLoader.min.js"></script>
    <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
    <div id="fpsCounter" style="position: absolute; top: 10px; left: 10px; color: white; background-color: black; padding: 5px;"></div>
    <style>
        html, body {
            overflow: hidden; /* Hide scrollbars */
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
        #renderCanvas {
            width: 100%;
            height: 100%;
            touch-action: none; /* Prevent default touch behaviors */
        }
        #controls {
            position: absolute;
            top: 10px;
            right: 10px; /* Move to the top right corner */
            background-color: rgba(0,0,0,0.6);
            padding: 8px;
            border-radius: 4px;
            z-index: 999;
            color: white;
        }
        select {
            margin: 4px;
            border-radius: 3px;
            padding: 2px 6px;
        }
    </style>
</head>
<body>
    
    <canvas id="renderCanvas" style="width: 100%; height: 100vh;"></canvas>
    <div id="controls">
        <select id="datasetSelect">
            <option value="Weather">Weather Data</option>
            <option value="Toxicology">Toxicology Data</option>
        </select>
        <select id="attribute1Select"></select>
        <select id="attribute2Select"></select>
    </div>
    <script src = "app.js"></script>
</body>
</html>
